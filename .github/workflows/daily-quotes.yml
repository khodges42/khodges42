name: Daily Affirmation

on:
  schedule:
    - cron: "17 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout public profile repo
        uses: actions/checkout@v4
        with:
          path: public

      - name: Checkout private affirmations repo
        uses: actions/checkout@v4
        with:
          repository: khodges42/quotes-private
          token: ${{ secrets.PRIVATE_QUOTES_TOKEN }}
          path: private

      - name: Update README affirmation
        run: |
          cd public

          quote="$(shuf -n 1 ../private/quotes.txt)"

          python3 <<EOF
          from pathlib import Path

          path = Path("README.md")
          text = path.read_text()

          start = "<!-- AFFIRMATION:START -->"
          end = "<!-- AFFIRMATION:END -->"

          before, rest = text.split(start)
          _, after = rest.split(end)

          replacement = f'{start}\n> {"""$QUOTE"""}\n{end}'

          path.write_text(before + replacement + after)
          EOF

      - name: Commit and push if changed
        run: |
          cd public
          git config user.name "K Bot"
          git config user.email "khodges42@users.noreply.github.com"

          git add README.md
          git diff --cached --quiet || git commit -m "Update daily thought"
          git push
